<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Tasks</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4ff;
      --surface: #ffffff;
      --surface2: #f0effe;
      --border: #e0ddf8;
      --accent: #534AB7;
      --accent-dark: #3C3489;
      --accent-light: #EEEDFE;
      --text: #1a1530;
      --muted: #6b6390;
      --hint: #a9a3c8;
      --red: #E24B4A; --red-bg: #FCEBEB; --red-text: #A32D2D;
      --amber: #EF9F27; --amber-bg: #FAEEDA; --amber-text: #854F0B;
      --green: #639922; --green-bg: #EAF3DE; --green-text: #3B6D11;
      --blue-bg: #E6F1FB; --blue-text: #185FA5;
      --coral-bg: #FAECE7; --coral-text: #993C1D;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
      color: var(--text);
    }

    .app { width: 100%; max-width: 520px; }

    /* Header */
    .header { text-align: center; margin-bottom: 1.8rem; }
    .header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.03em; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .header h1 i { color: var(--accent); font-size: 1.8rem; }
    .header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; transition: all 0.3s; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1rem; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.9rem 1rem; text-align: center; }
    .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }

    /* Progress */
    .progress-wrap { background: var(--border); border-radius: 100px; height: 7px; margin-bottom: 1.5rem; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--accent), #7f77dd); transition: width 0.5s cubic-bezier(.4,0,.2,1); }

    /* Input card */
    .input-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.2rem 1.4rem; margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(83,74,183,0.06); }
    .input-row { display: flex; gap: 8px; }
    .input-row input { flex: 1; border: 1.5px solid var(--border); border-radius: 10px; padding: 0.65rem 1rem; font-size: 0.95rem; font-family: inherit; color: var(--text); background: var(--surface2); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(83,74,183,0.12); }
    .input-row input::placeholder { color: var(--hint); }
    .btn-add { background: var(--accent); color: #fff; border: none; border-radius: 10px; width: 42px; height: 42px; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s, transform 0.1s; }
    .btn-add:hover { background: var(--accent-dark); transform: scale(1.05); }

    .row-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin: 0.9rem 0 0.4rem; }
    .pill-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { font-size: 0.8rem; font-family: inherit; padding: 4px 12px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all 0.15s; font-weight: 500; }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
    .pill.active.high { background: var(--red-bg); border-color: #F09595; color: var(--red-text); }
    .pill.active.med  { background: var(--amber-bg); border-color: #FAC775; color: var(--amber-text); }
    .pill.active.low  { background: var(--green-bg); border-color: #C0DD97; color: var(--green-text); }

    /* Filters */
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.9rem; }
    .filter-btn { font-size: 0.8rem; font-family: inherit; padding: 5px 14px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-weight: 500; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Task list */
    .tasks-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 2px 16px rgba(83,74,183,0.07); }
    .task-item { display: flex; align-items: center; gap: 12px; padding: 13px 1.25rem; border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: var(--surface2); }
    .task-item.entering { animation: fadeSlide 0.25s ease; }
    .task-item.leaving  { animation: fadeSlide 0.25s ease reverse; }
    @keyframes fadeSlide { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }

    .check-ring { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: transparent; }
    .check-ring:hover { border-color: var(--accent); background: var(--accent-light); }
    .check-ring.done { background: var(--accent); border-color: var(--accent); }
    .check-ring i { font-size: 13px; color: #fff; display: none; }
    .check-ring.done i { display: block; }

    .task-body { flex: 1; min-width: 0; }
    .task-text { font-size: 0.9rem; color: var(--text); transition: all 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
    .task-text.done { text-decoration: line-through; color: var(--hint); font-weight: 400; }
    .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
    .task-cat { font-size: 0.7rem; padding: 2px 8px; border-radius: 100px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    .cat-work     { background: var(--blue-bg);  color: var(--blue-text); }
    .cat-personal { background: var(--amber-bg); color: var(--amber-text); }
    .cat-health   { background: var(--green-bg); color: var(--green-text); }
    .cat-other    { background: var(--accent-light); color: var(--accent); }
    .pri-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .p-high { background: var(--red); }
    .p-med  { background: var(--amber); }
    .p-low  { background: var(--green); }

    .task-actions { opacity: 0; transition: opacity 0.15s; }
    .task-item:hover .task-actions { opacity: 1; }
    .del-btn { border: none; background: none; cursor: pointer; padding: 5px; border-radius: 7px; color: var(--hint); transition: all 0.15s; display: flex; align-items: center; font-size: 1rem; }
    .del-btn:hover { color: var(--red-text); background: var(--red-bg); }

    /* Empty state */
    .empty { padding: 3rem 1rem; text-align: center; }
    .empty i { font-size: 2.5rem; color: var(--hint); margin-bottom: 10px; display: block; }
    .empty p { font-size: 0.9rem; color: var(--muted); }

    /* Footer */
    .list-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.8rem; padding: 0 4px; }
    .footer-txt { font-size: 0.82rem; color: var(--muted); }
    .btn-clear { background: none; border: none; font-family: inherit; font-size: 0.82rem; color: var(--red-text); cursor: pointer; font-weight: 600; padding: 0; }
    .btn-clear:disabled { color: var(--hint); cursor: default; }

    /* Confetti burst (CSS only) */
    @keyframes burst { 0%{transform:scale(1);opacity:1} 100%{transform:scale(1.8);opacity:0} }
    .burst { animation: burst 0.4s ease forwards; }

    footer { margin-top: 3rem; font-size: 0.8rem; color: var(--hint); text-align: center; }
  </style>
</head>
<body>

<div class="app">

  <div class="header">
    <h1><i class="ti ti-checklist"></i> My Tasks</h1>
    <p id="greet">Let's get things done today.</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num" id="s-left">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat"><div class="stat-num" id="s-done">0</div><div class="stat-label">Done</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

  <div class="input-card">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="What needs to be done?" maxlength="120"/>
      <button class="btn-add" id="addBtn" title="Add task"><i class="ti ti-plus"></i></button>
    </div>

    <div class="row-label">Category</div>
    <div class="pill-row" id="catPills">
      <button class="pill active" data-cat="work">Work</button>
      <button class="pill" data-cat="personal">Personal</button>
      <button class="pill" data-cat="health">Health</button>
      <button class="pill" data-cat="other">Other</button>
    </div>

    <div class="row-label">Priority</div>
    <div class="pill-row" id="priPills">
      <button class="pill active high" data-pri="high">🔴 High</button>
      <button class="pill med"  data-pri="med">🟡 Medium</button>
      <button class="pill low"  data-pri="low">🟢 Low</button>
    </div>
  </div>

  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
    <button class="filter-btn" data-filter="work">Work</button>
    <button class="filter-btn" data-filter="personal">Personal</button>
    <button class="filter-btn" data-filter="health">Health</button>
  </div>

  <div class="tasks-card" id="taskList"></div>

  <div class="list-footer">
    <span class="footer-txt" id="footerTxt"></span>
    <button class="btn-clear" id="clearBtn" onclick="clearDone()">Clear done</button>
  </div>

</div>

<footer>My Tasks &middot; Deployed on Azure Static Web Apps</footer>

<script>
  let tasks = [
    { id:1, text:'Finish project report', done:false, cat:'work', pri:'high' },
    { id:2, text:'Morning run — 30 min', done:true,  cat:'health', pri:'med' },
    { id:3, text:'Reply to team emails',  done:false, cat:'work', pri:'high' },
    { id:4, text:'Read a chapter before bed', done:false, cat:'personal', pri:'low' },
    { id:5, text:'Buy groceries', done:true, cat:'personal', pri:'med' },
  ];
  let nextId = 6, selCat = 'work', selPri = 'high', activeFilter = 'all';
  const priOrder = { high:0, med:1, low:2 };
  const greets = ['Let\'s get things done today.','You\'ve got this!','Stay focused, keep going.','Almost there — keep it up!','Great progress!'];

  document.querySelectorAll('#catPills .pill').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('#catPills .pill').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); selCat = b.dataset.cat;
  }));
  document.querySelectorAll('#priPills .pill').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('#priPills .pill').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); selPri = b.dataset.pri;
  }));
  document.querySelectorAll('#filterRow .filter-btn').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('#filterRow .filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); activeFilter = b.dataset.filter; render();
  }));
  document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  document.getElementById('addBtn').addEventListener('click', addTask);

  function addTask() {
    const inp = document.getElementById('taskInput');
    const text = inp.value.trim();
    if (!text) { inp.focus(); return; }
    tasks.unshift({ id: nextId++, text, done: false, cat: selCat, pri: selPri });
    inp.value = ''; render(true);
  }
  function toggleTask(id) { const t = tasks.find(t=>t.id===id); if(t) t.done=!t.done; render(); }
  function deleteTask(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) { el.classList.add('leaving'); setTimeout(()=>{ tasks=tasks.filter(t=>t.id!==id); render(); }, 220); }
  }
  function clearDone() { tasks = tasks.filter(t=>!t.done); render(); }

  function filtered() {
    return tasks.filter(t => {
      if (activeFilter==='active') return !t.done;
      if (activeFilter==='done') return t.done;
      if (['work','personal','health','other'].includes(activeFilter)) return t.cat===activeFilter;
      return true;
    }).sort((a,b) => priOrder[a.pri]-priOrder[b.pri]);
  }

  function render(isNew=false) {
    const items = filtered();
    const total = tasks.length, done = tasks.filter(t=>t.done).length, left = total-done;
    const pct = total ? Math.round((done/total)*100) : 0;

    document.getElementById('s-total').textContent = total;
    document.getElementById('s-left').textContent  = left;
    document.getElementById('s-done').textContent  = done;
    document.getElementById('progressBar').style.width = pct+'%';
    document.getElementById('greet').textContent = (pct===100&&total>0) ? 'All done! Amazing work. 🎉' : greets[Math.min(Math.floor(pct/25),4)];
    document.getElementById('footerTxt').textContent = left===0&&total>0 ? 'All tasks complete! 🎉' : `${left} task${left!==1?'s':''} remaining`;
    const cb = document.getElementById('clearBtn'); cb.disabled = !tasks.some(t=>t.done);

    const msgs = { all:'No tasks yet — add one above!', active:'Nothing active right now.', done:'No completed tasks yet.', work:'No work tasks.', personal:'No personal tasks.', health:'No health tasks.', other:'No other tasks.' };
    if (!items.length) {
      document.getElementById('taskList').innerHTML = `<div class="empty"><i class="ti ti-mood-smile"></i><p>${msgs[activeFilter]||'Nothing here.'}</p></div>`;
      return;
    }
    document.getElementById('taskList').innerHTML = items.map((t,i)=>`
      <div class="task-item${isNew&&i===0?' entering':''}" data-id="${t.id}">
        <div class="check-ring${t.done?' done':''}" onclick="toggleTask(${t.id})">
          <i class="ti ti-check"></i>
        </div>
        <div class="task-body">
          <div class="task-text${t.done?' done':''}">${esc(t.text)}</div>
          <div class="task-meta">
            <span class="task-cat cat-${t.cat}">${t.cat}</span>
            <span class="pri-dot p-${t.pri==='med'?'med':t.pri}" title="${t.pri} priority"></span>
          </div>
        </div>
        <div class="task-actions">
          <button class="del-btn" onclick="deleteTask(${t.id})" title="Delete"><i class="ti ti-trash"></i></button>
        </div>
      </div>`).join('');
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  render();
</script>
</body>
</html>
